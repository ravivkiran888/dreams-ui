name: 🚀 CD - Deploy to AWS ECS

on:
  workflow_run:
    workflows: ["🐳 CI - Build & Push Docker Image to ECR"]
    types:
      - completed
  workflow_dispatch:
    description: 'Manual trigger to deploy latest image to ECS'

env:
  AWS_REGION: us-east-1
  ECS_SERVICE: dreams-service
  ECS_CLUSTER: dreams-cluster
  ECS_TASK_DEFINITION: dreams-task-definition
  ECR_REPOSITORY: dreams-react-app

jobs:
  # Deploy to ECS only if build succeeded
  deploy-to-ecs:
    runs-on: ubuntu-latest
    name: Deploy to AWS ECS
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get latest image URI
        id: get-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "Using image: $IMAGE_URI"

      - name: Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs-task-definition.json
          container-name: dreams-app
          image: ${{ steps.get-image.outputs.image-uri }}

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deployment successful
        run: echo "✅ Successfully deployed to ECS!"

  # Notify if build failed
  build-failed:
    runs-on: ubuntu-latest
    name: Build Failed Notification
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    
    steps:
      - name: Notify build failure
        run: |
          echo "❌ Build & Push workflow failed"
          echo "Check build logs: ${{ github.event.workflow_run.html_url }}"
          exit 1

